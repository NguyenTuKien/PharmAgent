services:
  database:
    image: mongo:latest
    restart: always
    # ports:
    #   - "27017:27017"
    env_file:
      - .env
    volumes:
      - ./database/mongo-data:/data/db
      - ./database/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pharmagent
  
  backend:
    build: ./backend
    image: ${DOCKER_REGISTRY:-ngtukien218}/pharmagent-backend:${BACKEND_VERSION:-latest}
    restart: always
    environment:
      # Bắt buộc phải dùng URI nguyên khối cho Spring Boot 3.0 trở lên
      SPRING_MONGODB_URI: "mongodb://${SPRING_MONGODB_USERNAME}:${SPRING_MONGODB_PASSWORD}@database:27017/${SPRING_MONGODB_DATABASE}?authSource=${SPRING_MONGODB_DATABASE}"
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP" ]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - pharmagent

  frontend:
    build: ./frontend
    image: ${DOCKER_REGISTRY:-ngtukien218}/pharmagent-frontend:${FRONTEND_VERSION:-latest}
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pharmagent
    
networks:
  pharmagent:
    driver: bridge
  


