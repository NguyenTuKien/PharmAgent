services:
  database:
    image: mongo:latest
    restart: always
    # ports:
    #   - "27017:27017"
    env_file:
      - .env
    volumes:
      - ./database/mongo-data:/data/db
      - ./database/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      # Cập nhật mongo thành mongosh
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pilllen
  
  backend:
    build: ./backend
    image: ${DOCKER_REGISTRY:-ngtukien218}/pilllen-backend:${BACKEND_VERSION:-latest}
    restart: always
    # ports:
    #   - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: database
      DB_PORT: 27017
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - pilllen

  frontend:
    build: ./frontend
    image: ${DOCKER_REGISTRY:-ngtukien218}/pilllen-frontend:${FRONTEND_VERSION:-latest}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pilllen
    
networks:
  pilllen:
    driver: bridge
  


